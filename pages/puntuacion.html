<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntuacion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        form {
            height: auto;
            width: 57%;
            padding: 25px;
        }

        form h3 { margin-bottom: 5px; }

        div { display: flex; flex-direction: row; }

        input {
            height: 45px;
            width: 95%;
            margin: 5px;
            font-size: 20px;
        }

        ::placeholder { color: white; }

        table {
            width: 100%;
            font-size: 150%;
            text-align: center;
        }

        table thead { background-color: rgba(4, 124, 4, 0.457); }
        table tr { height: 40px; }
        table tr:nth-child(even) { background-color: rgba(4, 124, 4, 0.37); }

        @media (max-width: 768px) {
            table { font-size: 100%; }
        }
    </style>
</head>

<body>
    <form id="regForm">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h3 id="back" hidden>&lt;</h3>
            <h3 id="title" style="flex-grow:1;text-align:center;">Puntuaciones</h3>
            <h3 id="next" hidden>&gt;</h3>
        </div>
        <div id="search">
            <input type="text" placeholder="Tutor" id="tutorInput">
            <input type="text" placeholder="Nickname" id="nicknameInput">
        </div>

        <table></table>

        <button></button>
    </form>
</body>
<script type="module" src="./puntuacion.js"></script>

</html>
