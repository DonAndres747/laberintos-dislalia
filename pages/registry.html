<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        form {
            height: 560px;
            width: 400px;
            padding: 35px;
        }

        input {
            height: 45px;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <form id="regForm">
        <h3>Registro</h3>

        <input type="text" placeholder="Nombre y Apellido" id="username">
        <input type="text" placeholder="Nickname" id="nickname">
        <div id="nickPassAlert"></div>

        <input type="text" placeholder="Tutor" id="tutor">
        <input type="number" placeholder="Edad" id="age">
        <input type="password" placeholder="Contraseña" id="password">
        <input type="password" placeholder="Repetir Contraseña" id="repPass">
        <div id="repPassAlert"></div>

        <button>Registrar</button>
        <div class="secondary-btn">
            <div id="volver">Volver</div>
        </div>
    </form>
</body>
<script type="module" src="./registry.js"></script>

</html>
